name: Bootstrap cluster

# One-time / occasional platform bring-up for sparx-prod. Owns the resources
# that don't roll on every commit:
#   - Namespaces + service accounts (with the Workload Identity annotation)
#   - Caddy ingress (Deployment + Service + LoadBalancer IP patch)
#   - Redis (cache + BullMQ broker)
#   - PgBouncer (transaction-mode pool — required for RLS SET LOCAL)
#
# Why this exists separately from deploy-prod.yml: deploy-prod only rolls
# app container images into existing Deployments. Adding a new platform pod
# is a separate operation with different blast radius and review needs.
#
# Trigger: workflow_dispatch only — human-gated by design. Pick `components`
# to apply just one slice (e.g. re-apply caddy after a Caddyfile change).

on:
  workflow_dispatch:
    inputs:
      components:
        description: 'What to apply'
        required: true
        default: 'all-platform'
        type: choice
        options:
          - all-platform
          - namespaces-only
          - caddy
          - redis
          - pgbouncer
          - app-env
          - app-secrets
          - apps
          - workers

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID: sparxworks
  REGION: us-central1
  CLUSTER: sparx-prod-autopilot
  NAMESPACE: sparx-prod
  INGRESS_IP: 35.254.145.54   # google_compute_address.ingress
  WIF_PROVIDER: projects/631794111842/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: sparx-deployer@sparxworks.iam.gserviceaccount.com
  APP_GSA: sparx-app@sparxworks.iam.gserviceaccount.com

jobs:
  bootstrap:
    name: Apply ${{ inputs.components }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      # Same auth path as db-migrate.yml — Connect Gateway through Google's
      # proxy. Works against the cluster's locked-down master without needing
      # the runner's IP in the authorized networks list.
      - name: Get GKE credentials via Connect Gateway
        # Fleet membership lives at `global` (terraform/modules/gke/main.tf).
        run: gcloud container fleet memberships get-credentials "$CLUSTER" --location global

      - name: Apply namespaces + service accounts
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'namespaces-only' }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/01-service-accounts.yaml
          # Bind the sparx-app KSA to the GCP service account for Workload Identity.
          # The annotation isn't in the YAML (kept generic so it doesn't pin a project).
          kubectl annotate serviceaccount sparx-app -n "$NAMESPACE" \
            iam.gke.io/gcp-service-account="$APP_GSA" --overwrite

      - name: Apply Caddy ingress
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'caddy' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/caddy/
          # Bind the LoadBalancer to the reserved static IP from Terraform.
          # idempotent: if already bound, this is a no-op patch.
          kubectl patch service caddy -n "$NAMESPACE" \
            -p "{\"spec\":{\"loadBalancerIP\":\"$INGRESS_IP\"}}"
          kubectl rollout status deployment/caddy -n "$NAMESPACE" --timeout=5m

      - name: Apply Redis
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'redis' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/redis/
          kubectl rollout status statefulset/redis -n "$NAMESPACE" --timeout=5m

      - name: Apply PgBouncer
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'pgbouncer' }}
        run: |
          set -euo pipefail
          # PgBouncer reads POSTGRES_HOST and POSTGRES_PASSWORD from
          # `pgbouncer-secrets`. Source of truth: the Cloud SQL private IP
          # (from terraform output) and the app role password (sparx-db-app-password
          # in Secret Manager).
          DB_HOST=$(gcloud sql instances list --project="$PROJECT_ID" \
            --filter="name~sparx-prod-pg" --format="value(ipAddresses[0].ipAddress)" | head -1)
          DB_PWD=$(gcloud secrets versions access latest --secret=sparx-db-app-password --project="$PROJECT_ID")
          kubectl create secret generic pgbouncer-secrets \
            -n "$NAMESPACE" \
            --from-literal=POSTGRES_HOST="$DB_HOST" \
            --from-literal=POSTGRES_PASSWORD="$DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/pgbouncer/
          # If the image or env changed, force a rollout so existing pods pick
          # up the new spec.
          kubectl rollout restart deployment/pgbouncer -n "$NAMESPACE"
          kubectl rollout status deployment/pgbouncer -n "$NAMESPACE" --timeout=5m

      # Non-secret app env shared by api-rest, dashboard, and future services.
      # Pulls from k8s/sparx-prod/app-env-configmap.yaml. Pod restarts pick up
      # changes on the next rollout (no automatic refresh — explicit by design).
      - name: Apply sparx-app-env ConfigMap
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'app-env' }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/sparx-prod/app-env-configmap.yaml

      # Pull every entry of the canonical secret list out of GCP Secret Manager
      # and recreate `sparx-app-secrets` from them. This mirrors what
      # k8s/scripts/sync-secrets.ps1 does locally, but workflow-driven so the
      # cluster state is reproducible from CI. Missing-in-SM secrets are
      # warned, not failed — phase 1 doesn't have every key populated yet.
      - name: Sync sparx-app-secrets from Secret Manager
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'app-secrets' }}
        run: |
          set -euo pipefail
          KEYS=(
            database-url
            redis-url
            better-auth-secret
            sparx-internal-jwt-secret
            stripe-secret-key
            stripe-webhook-secret
            godaddy-api-key-ote
            godaddy-api-secret-ote
            godaddy-api-key-prod
            godaddy-api-secret-prod
            postal-api-key
            cloudflare-api-token
          )
          literals=()
          for key in "${KEYS[@]}"; do
            if value=$(gcloud secrets versions access latest --secret="$key" --project="$PROJECT_ID" 2>/dev/null); then
              env_name=$(echo "$key" | tr 'a-z-' 'A-Z_')
              literals+=("--from-literal=${env_name}=${value}")
              echo "  + $env_name"
            else
              echo "::warning::Skipping $key — not set in Secret Manager yet."
            fi
          done
          kubectl delete secret sparx-app-secrets -n "$NAMESPACE" --ignore-not-found
          kubectl create secret generic sparx-app-secrets -n "$NAMESPACE" "${literals[@]}"
          # Force-roll any Deployment that consumes the secret so the new
          # values land. Selector tier=api|web matches the app manifests.
          for tier in api web; do
            if kubectl get deployment -n "$NAMESPACE" -l "tier=$tier" -o name | grep -q .; then
              kubectl rollout restart deployment -n "$NAMESPACE" -l "tier=$tier"
            fi
          done

      # App Deployments themselves (web, api-rest, dashboard). The deploy-prod
      # workflow only rolls images into existing Deployments — this step is
      # what *creates* them in the first place. Re-apply is safe (kubectl
      # apply is declarative).
      - name: Apply app Deployments
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'apps' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/apps/

      # Worker Deployments (Pub/Sub consumers). Same pattern as apps —
      # deploy-prod only rolls images; this step creates the Deployments.
      - name: Apply worker Deployments
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'workers' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/workers/

      - name: Show cluster state
        if: always()
        run: |
          echo "::group::Pods"
          kubectl get pod -n "$NAMESPACE" -o wide || true
          echo "::endgroup::"
          echo "::group::Services"
          kubectl get svc -n "$NAMESPACE" || true
          echo "::endgroup::"
          echo "::group::Deployments + StatefulSets"
          kubectl get deploy,sts -n "$NAMESPACE" || true
          echo "::endgroup::"
