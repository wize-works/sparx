name: Bootstrap cluster

# One-time / occasional platform bring-up for sparx-prod. Owns the resources
# that don't roll on every commit:
#   - Namespaces + service accounts (with the Workload Identity annotation)
#   - Caddy ingress (Deployment + Service + LoadBalancer IP patch)
#   - Redis (cache + BullMQ broker)
#   - PgBouncer (transaction-mode pool — required for RLS SET LOCAL)
#
# Why this exists separately from deploy-prod.yml: deploy-prod only rolls
# app container images into existing Deployments. Adding a new platform pod
# is a separate operation with different blast radius and review needs.
#
# Trigger: workflow_dispatch only — human-gated by design. Pick `components`
# to apply just one slice (e.g. re-apply caddy after a Caddyfile change).

on:
  workflow_dispatch:
    inputs:
      components:
        description: 'What to apply'
        required: true
        default: 'all-platform'
        type: choice
        options:
          - all-platform
          - namespaces-only
          - caddy
          - redis
          - typesense
          - pgbouncer
          - app-env
          - app-secrets
          - apps
          - workers
          - workers-prune
          - cronjobs
          # Postal was deprecated 2026-05-29 (Postal's smtp_relays can't
          # auth to Mailgun by design — config_schema.rb:79 drops
          # uri.user/uri.password — and GCP blocks outbound :25, so
          # Postal couldn't deliver from our cluster at all). email-worker
          # now POSTs directly to Mailgun's HTTP API. The Postal apply
          # path is kept (gated only on `postal`, NOT all-platform) so
          # we can resurrect it if we ever revisit self-hosting. Run
          # `postal-teardown` once to drop the namespace + free quota.
          - postal
          - postal-make-user
          - postal-teardown

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

env:
  PROJECT_ID: sparxworks
  REGION: us-central1
  CLUSTER: sparx-prod-autopilot
  NAMESPACE: sparx-prod
  INGRESS_IP: 35.254.145.54 # google_compute_address.ingress
  WIF_PROVIDER: projects/631794111842/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: sparx-deployer@sparxworks.iam.gserviceaccount.com
  APP_GSA: sparx-app@sparxworks.iam.gserviceaccount.com

jobs:
  bootstrap:
    name: Apply ${{ inputs.components }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      # Same auth path as db-migrate.yml — Connect Gateway through Google's
      # proxy. Works against the cluster's locked-down master without needing
      # the runner's IP in the authorized networks list.
      - name: Get GKE credentials via Connect Gateway
        # Fleet membership lives at `global` (terraform/modules/gke/main.tf).
        run: gcloud container fleet memberships get-credentials "$CLUSTER" --location global

      - name: Apply namespaces + service accounts
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'namespaces-only' }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/01-service-accounts.yaml
          # Bind the sparx-app KSA to the GCP service account for Workload Identity.
          # The annotation isn't in the YAML (kept generic so it doesn't pin a project).
          kubectl annotate serviceaccount sparx-app -n "$NAMESPACE" \
            iam.gke.io/gcp-service-account="$APP_GSA" --overwrite

      - name: Apply Caddy ingress
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'caddy' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/caddy/
          # Bind the LoadBalancer to the reserved static IP from Terraform.
          # idempotent: if already bound, this is a no-op patch.
          kubectl patch service caddy -n "$NAMESPACE" \
            -p "{\"spec\":{\"loadBalancerIP\":\"$INGRESS_IP\"}}"
          kubectl rollout status deployment/caddy -n "$NAMESPACE" --timeout=5m

      - name: Apply Redis
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'redis' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/redis/
          kubectl rollout status statefulset/redis -n "$NAMESPACE" --timeout=5m

      - name: Apply Typesense
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'typesense' }}
        run: |
          set -euo pipefail
          # Typesense API key is generated outside the cluster (Phase 1
          # admin convention — Typesense doesn't rotate). Source from
          # Secret Manager so the k8s secret matches the value
          # commerce-indexer reads via its Cloud Run env binding.
          TS_KEY=$(gcloud secrets versions access latest --secret=typesense-api-key --project="$PROJECT_ID")
          kubectl create secret generic typesense-secrets \
            -n "$NAMESPACE" \
            --from-literal=api-key="$TS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/typesense/
          kubectl rollout status statefulset/typesense -n "$NAMESPACE" --timeout=5m

      - name: Apply PgBouncer
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'pgbouncer' }}
        run: |
          set -euo pipefail
          # PgBouncer reads POSTGRES_HOST and POSTGRES_PASSWORD from
          # `pgbouncer-secrets`. Source of truth: the Cloud SQL private IP
          # (from terraform output) and the app role password (sparx-db-app-password
          # in Secret Manager).
          DB_HOST=$(gcloud sql instances list --project="$PROJECT_ID" \
            --filter="name~sparx-prod-pg" --format="value(ipAddresses[0].ipAddress)" | head -1)
          DB_PWD=$(gcloud secrets versions access latest --secret=sparx-db-app-password --project="$PROJECT_ID")
          kubectl create secret generic pgbouncer-secrets \
            -n "$NAMESPACE" \
            --from-literal=POSTGRES_HOST="$DB_HOST" \
            --from-literal=POSTGRES_PASSWORD="$DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/pgbouncer/
          # If the image or env changed, force a rollout so existing pods pick
          # up the new spec.
          kubectl rollout restart deployment/pgbouncer -n "$NAMESPACE"
          kubectl rollout status deployment/pgbouncer -n "$NAMESPACE" --timeout=5m

      # Non-secret app env shared by api-rest, dashboard, and future services.
      # Pulls from k8s/sparx-prod/app-env-configmap.yaml. Pod restarts pick up
      # changes on the next rollout (no automatic refresh — explicit by design).
      - name: Apply sparx-app-env ConfigMap
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'app-env' }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/sparx-prod/app-env-configmap.yaml

      # Pull every entry of the canonical secret list out of GCP Secret Manager
      # and recreate `sparx-app-secrets` from them. This mirrors what
      # k8s/scripts/sync-secrets.ps1 does locally, but workflow-driven so the
      # cluster state is reproducible from CI. Missing-in-SM secrets are
      # warned, not failed — phase 1 doesn't have every key populated yet.
      - name: Sync sparx-app-secrets from Secret Manager
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'app-secrets' }}
        run: |
          set -euo pipefail
          KEYS=(
            database-url
            auth-database-url
            redis-url
            better-auth-secret
            sparx-internal-jwt-secret
            stripe-secret-key
            stripe-webhook-secret
            godaddy-api-key-ote
            godaddy-api-secret-ote
            godaddy-api-key-prod
            godaddy-api-secret-prod
            postal-api-key
            cloudflare-api-token
          )
          literals=()
          for key in "${KEYS[@]}"; do
            if value=$(gcloud secrets versions access latest --secret="$key" --project="$PROJECT_ID" 2>/dev/null); then
              env_name=$(echo "$key" | tr 'a-z-' 'A-Z_')
              literals+=("--from-literal=${env_name}=${value}")
              echo "  + $env_name"
            else
              echo "::warning::Skipping $key — not set in Secret Manager yet."
            fi
          done
          kubectl delete secret sparx-app-secrets -n "$NAMESPACE" --ignore-not-found
          kubectl create secret generic sparx-app-secrets -n "$NAMESPACE" "${literals[@]}"
          # Force-roll any Deployment that consumes the secret so the new
          # values land. Selector tier=api|web matches the app manifests.
          for tier in api web; do
            if kubectl get deployment -n "$NAMESPACE" -l "tier=$tier" -o name | grep -q .; then
              kubectl rollout restart deployment -n "$NAMESPACE" -l "tier=$tier"
            fi
          done

      # App Deployments themselves (web, api-rest, dashboard). The deploy-prod
      # workflow only rolls images into existing Deployments — this step is
      # what *creates* them in the first place. Re-apply is safe (kubectl
      # apply is declarative).
      - name: Apply app Deployments
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'apps' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/apps/
          # PARKED — 2026-05-29. api-mcp is scaled to 0 until the
          # SSD_TOTAL_GB quota is bumped (see k8s/apps/api-mcp.yaml header).
          # The manifest no longer ships an HPA or PDB for api-mcp; this
          # delete is what makes `kubectl apply -k` semantically prune
          # them, since apply itself is non-pruning. Drop this block when
          # the manifest restores HPA + PDB on quota bump.
          kubectl delete hpa api-mcp -n "$NAMESPACE" --ignore-not-found
          kubectl delete pdb api-mcp -n "$NAMESPACE" --ignore-not-found

      # Worker Deployments (Pub/Sub consumers). Same pattern as apps —
      # deploy-prod only rolls images; this step creates the Deployments.
      - name: Apply worker Deployments
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'workers' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/workers/

      # CRM scheduled jobs — k8s CronJobs that POST to api-rest's
      # /internal/crm/* endpoints with the shared secret. See
      # k8s/cronjobs/README.md for the four jobs and their schedules.
      # Idempotent — `kubectl apply -k` updates existing schedules in place.
      - name: Apply CRM CronJobs
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'cronjobs' }}
        run: |
          set -euo pipefail
          kubectl apply -k k8s/cronjobs/

      # One-shot tear-down for workers that have migrated to Cloud Run.
      # `kubectl apply -k` does not prune resources that were removed from
      # the kustomization, so the in-cluster Deployment + PDB linger after
      # the manifest is commented out. This step deletes them explicitly.
      #
      # WHEN TO RUN: after the Cloud Run service for the same worker is
      # live AND its push subscription has been verified end-to-end —
      # running this earlier strands the topic with no consumer.
      #
      # Idempotent: --ignore-not-found means re-running is a no-op.
      # NOT wired into all-platform; this is a deliberate human-gated lever.
      - name: Prune workers migrated to Cloud Run
        if: ${{ inputs.components == 'workers-prune' }}
        run: |
          set -euo pipefail
          for w in email-worker media-worker; do
            kubectl delete deployment "$w" -n "$NAMESPACE" --ignore-not-found
            kubectl delete pdb "$w" -n "$NAMESPACE" --ignore-not-found
          done

      # Postal — self-hosted email server in its own namespace. Lives
      # outside `sparx-prod` so it can be re-deployed independently and
      # because the operational profile is different from app pods.
      #
      # Multi-stage because Postal has a hard ordering requirement:
      #   1. Namespace + SA
      #   2. MariaDB + RabbitMQ (wait Ready — config depends on them)
      #   3. Sync postal-* secrets from Secret Manager into the three
      #      k8s Secret objects (mariadb-credentials, rabbitmq-credentials,
      #      postal-secrets — same source values reused across fields)
      #   4. ConfigMap + bootstrap Job (schema migrate; wait Complete)
      #   5. postal-web / -worker / -smtp / -cron Deployments
      #
      # FIRST-BOOT: see k8s/postal/README.md for the manual follow-up
      # (postal make-user, create org/server/credential, push API key to
      # Secret Manager, then re-run components=app-secrets to wire
      # SPARX_POSTAL_API_KEY through to email-worker).
      - name: Apply Postal
        # NOTE: no longer included in all-platform (Postal was decommissioned
        # 2026-05-29 — see option-list comment). Still callable explicitly
        # via components=postal in case we need to resurrect the stack.
        if: ${{ inputs.components == 'postal' }}
        env:
          POSTAL_NS: postal
        run: |
          set -euo pipefail

          # Stage 1: namespace + service account.
          kubectl apply -f k8s/postal/namespace.yaml

          # Stage 2: sync secrets from GCP Secret Manager into the three
          # k8s Secret objects. Source secrets in SM:
          #   postal-mariadb-root-password
          #   postal-db-password           (also used by Postal as POSTAL_DB_PASSWORD)
          #   postal-rabbitmq-password     (also used by Postal as POSTAL_RABBITMQ_PASSWORD)
          #   postal-rails-secret-key
          #   postal-signing-key           (generated by `postal initialize` on
          #                                 first boot — re-sync after to populate)
          fetch() {
            gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null || echo ""
          }
          MARIADB_ROOT_PASSWORD=$(fetch postal-mariadb-root-password)
          MARIADB_PASSWORD=$(fetch postal-db-password)
          RAILS_SECRET_KEY=$(fetch postal-rails-secret-key)
          SIGNING_KEY=$(fetch postal-signing-key)
          MAILGUN_SMTP_USERNAME=$(fetch mailgun-smtp-username)
          MAILGUN_SMTP_PASSWORD=$(fetch mailgun-smtp-password)
          # postal-rabbitmq-password is intentionally not fetched — Postal v3
          # has no rabbitmq dependency. Leave the SM secret as historical.

          for name in MARIADB_ROOT_PASSWORD MARIADB_PASSWORD RAILS_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name source secret is missing in Secret Manager; aborting Postal bootstrap."
              echo "::error::Create the postal-* secrets first — see k8s/postal/README.md."
              exit 1
            fi
          done
          if [ -z "$SIGNING_KEY" ]; then
            echo "::warning::postal-signing-key not set — Postal will generate one during initialize."
            echo "::warning::After this run, export the key from the running pod and push it to Secret Manager."
          fi

          # Mailgun smarthost (Postal v3). User + password go in URI userinfo
          # and MUST be percent-encoded — the username is `postmaster@sparx.email`
          # which has an `@` that would otherwise terminate userinfo prematurely.
          #
          # NOTE on env-var shape: Postal's docs show the JSON-array form
          # POSTAL_SMTP_RELAYS=["smtp://..."], but in practice Konfig's
          # env-var-to-array coercion does NOT JSON-decode — it wraps the
          # raw env value as a single-element array, which means brackets
          # and quotes are treated as literal URI characters and URI.parse
          # explodes (see init crash 2026-05-29). For one relay, pass the
          # bare URI string. For multiple relays you'd need separate per-
          # index env vars (POSTAL_SMTP_RELAYS_0, _1, …) — re-verify
          # against Konfig source before adding that.
          #
          # We relay through Mailgun because GCP blocks outbound TCP/25 at
          # the network edge; :587 with STARTTLS + SMTP AUTH is allowed.
          POSTAL_SMTP_RELAYS=""
          if [ -n "$MAILGUN_SMTP_USERNAME" ] && [ -n "$MAILGUN_SMTP_PASSWORD" ]; then
            enc_user=$(python3 -c 'import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=""))' "$MAILGUN_SMTP_USERNAME")
            enc_pass=$(python3 -c 'import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=""))' "$MAILGUN_SMTP_PASSWORD")
            POSTAL_SMTP_RELAYS="smtp://${enc_user}:${enc_pass}@smtp.mailgun.org:587?ssl_mode=STARTTLS"
          else
            echo "::warning::mailgun-smtp-username/password missing in Secret Manager — Postal will fall back to direct outbound, which GCP blocks. Add these secrets to enable Mailgun smarthost."
          fi

          kubectl create secret generic mariadb-credentials -n "$POSTAL_NS" \
            --from-literal=MARIADB_ROOT_PASSWORD="$MARIADB_ROOT_PASSWORD" \
            --from-literal=MARIADB_DATABASE=postal \
            --from-literal=MARIADB_USER=postal \
            --from-literal=MARIADB_PASSWORD="$MARIADB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          # postal-secrets uses Konfig-derived env var names — no POSTAL_
          # prefix because :main_db / :message_db / :rails are top-level
          # Konfig groups parallel to :postal (see k8s/postal/config.yaml
          # header for the full schema-path → env-var rule). These env
          # vars override the legacy YAML values at Postal startup.
          #
          # Postal v3 dropped RabbitMQ — no rabbitmq-credentials needed
          # and POSTAL_RABBITMQ_PASSWORD isn't read by any code path.
          kubectl create secret generic postal-secrets -n "$POSTAL_NS" \
            --from-literal=MAIN_DB_PASSWORD="$MARIADB_PASSWORD" \
            --from-literal=MESSAGE_DB_PASSWORD="$MARIADB_PASSWORD" \
            --from-literal=RAILS_SECRET_KEY="$RAILS_SECRET_KEY" \
            --from-literal=SIGNING_KEY="$SIGNING_KEY" \
            --from-literal=POSTAL_SMTP_RELAYS="$POSTAL_SMTP_RELAYS" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Stage 3: MariaDB. Wait Ready before progressing — the
          # bootstrap Job needs the DB to accept connections. RabbitMQ
          # was dropped in Postal v3, so we skip rabbitmq.yaml; the
          # StatefulSet manifest stays in-tree until we delete it.
          kubectl apply -f k8s/postal/mariadb.yaml
          kubectl rollout status statefulset/mariadb -n "$POSTAL_NS" --timeout=5m

          # Stage 4: config + schema-migrate Job.
          kubectl apply -f k8s/postal/config.yaml
          kubectl delete job postal-initialize -n "$POSTAL_NS" --ignore-not-found
          kubectl apply -f k8s/postal/bootstrap-job.yaml
          kubectl wait --for=condition=complete job/postal-initialize \
            -n "$POSTAL_NS" --timeout=5m

          # Stage 5: app Deployments. Postal v3 dropped postal-cron;
          # scheduled tasks live in the worker.
          kubectl apply -f k8s/postal/smtp.yaml
          kubectl apply -f k8s/postal/web.yaml
          kubectl apply -f k8s/postal/worker.yaml

          # postal-secrets is consumed via envFrom; k8s does NOT auto-restart
          # pods when a referenced Secret changes. Force a rollout so each
          # Deployment re-reads the env (Mailgun creds, etc.). Idempotent —
          # if the spec didn't actually change pods stay running, k8s just
          # bumps the rollout revision counter.
          kubectl rollout restart deployment/postal-web -n "$POSTAL_NS"
          kubectl rollout restart deployment/postal-smtp -n "$POSTAL_NS"
          kubectl rollout restart deployment/postal-worker -n "$POSTAL_NS"

          kubectl rollout status deployment/postal-web -n "$POSTAL_NS" --timeout=5m
          kubectl rollout status deployment/postal-smtp -n "$POSTAL_NS" --timeout=5m
          kubectl rollout status deployment/postal-worker -n "$POSTAL_NS" --timeout=5m

      # Idempotent first-boot admin-user creation. `postal make-user` is
      # an interactive CLI — we pipe email + name + password via stdin.
      # Postal returns non-zero if the user already exists; we swallow
      # that so reruns are no-ops. Credentials live in Secret Manager:
      #   postal-admin-email / postal-admin-name / postal-admin-password
      #
      # KNOWN LIMITATION: Connect Gateway (the path the runner uses to
      # reach the cluster) does not reliably stream stdin through
      # `kubectl exec -i` — it returns Google's branded "400 Bad
      # Request" HTML. The first time you bootstrap, run this step
      # locally instead (same script body, your local kubectl context
      # talks to Connect Gateway with auth that proxies stdin
      # correctly). After the user exists, reruns of this step from
      # the runner will succeed by hitting the "already exists"
      # idempotent path. See feedback_connect_gateway_stdin.md.
      - name: Create Postal admin user
        if: ${{ inputs.components == 'all-platform' || inputs.components == 'postal-make-user' }}
        env:
          POSTAL_NS: postal
        run: |
          set -euo pipefail
          fetch() {
            gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null || echo ""
          }
          ADMIN_EMAIL=$(fetch postal-admin-email)
          ADMIN_NAME=$(fetch postal-admin-name)
          ADMIN_PASSWORD=$(fetch postal-admin-password)
          for name in ADMIN_EMAIL ADMIN_NAME ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name source secret is missing in Secret Manager; create postal-admin-{email,name,password} first."
              exit 1
            fi
          done

          POD=$(kubectl get pod -n "$POSTAL_NS" -l app=postal-web -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$POD" ]; then
            echo "::error::no postal-web pod found in $POSTAL_NS; run components=postal first."
            exit 1
          fi
          echo "Using pod: $POD"

          # `postal make-user` reads email/first-name/last-name/password/confirm
          # from stdin (one per line). It exits non-zero on duplicate email —
          # treat that as success since the desired state is "user exists".
          # Split "$ADMIN_NAME" into first + last (first space splits; rest
          # becomes last name). If no space, last name is empty.
          FIRST_NAME=$(printf '%s' "$ADMIN_NAME" | cut -d' ' -f1)
          LAST_NAME=$(printf '%s' "$ADMIN_NAME" | cut -d' ' -f2-)
          if [ "$LAST_NAME" = "$FIRST_NAME" ]; then LAST_NAME=""; fi

          # Pipe stdin via printf rather than a heredoc — heredoc closing
          # markers can't be re-indented inside YAML run blocks.
          STDIN=$(printf '%s\n%s\n%s\n%s\n' "$ADMIN_EMAIL" "$FIRST_NAME" "$LAST_NAME" "$ADMIN_PASSWORD")
          set +e
          OUTPUT=$(printf '%s' "$STDIN" | kubectl exec -i -n "$POSTAL_NS" "$POD" -- postal make-user 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT_CODE -eq 0 ]; then
            echo "::notice::Postal admin user created."
          elif echo "$OUTPUT" | grep -qi "already.*exist\|taken\|duplicate"; then
            echo "::notice::Postal admin user already exists — skipping (idempotent)."
          else
            echo "::error::postal make-user failed unexpectedly (exit $EXIT_CODE)."
            exit $EXIT_CODE
          fi

      # One-shot decommission for the Postal stack. Deletes the entire
      # `postal` namespace, which cascades to all Deployments, Services,
      # the MariaDB StatefulSet, its PVC (~20GB SSD reclaimed), the
      # Secrets/ConfigMap, and the SA. Idempotent via --ignore-not-found.
      # Run once via `gh workflow run bootstrap.yml -f components=postal-teardown`.
      - name: Tear down Postal
        if: ${{ inputs.components == 'postal-teardown' }}
        run: |
          set -euo pipefail
          echo "Pre-teardown state:"
          kubectl get all,pvc -n postal 2>/dev/null || echo "(namespace already gone)"
          echo ""
          echo "Deleting namespace 'postal' (cascades to all child resources)..."
          kubectl delete namespace postal --ignore-not-found --wait=true --timeout=5m
          echo "Done. Quota freed: ~20GB SSD (mariadb PVC) + ~1.5 vCPU / 2Gi memory across web/smtp/worker."

      - name: Show cluster state
        if: always()
        run: |
          for ns in "$NAMESPACE" postal; do
            if ! kubectl get ns "$ns" >/dev/null 2>&1; then
              continue
            fi
            echo "::group::[$ns] Pods"
            kubectl get pod -n "$ns" -o wide || true
            echo "::endgroup::"
            echo "::group::[$ns] Services"
            kubectl get svc -n "$ns" || true
            echo "::endgroup::"
            echo "::group::[$ns] Deployments + StatefulSets + Jobs"
            kubectl get deploy,sts,job -n "$ns" || true
            echo "::endgroup::"
          done
