name: Auto tag

# On every push to main, analyze conventional-commit messages since the last
# v* tag and push a new tag if there's something releasable. The tag push
# fires build-images.yml and deploy-prod.yml.
#
# Bump rules (driven by mathieudutour/github-tag-action's defaults):
#   feat: / feat(scope):           → minor
#   fix:  / perf:                  → patch
#   feat!: / footer BREAKING CHANGE → major
#   chore / docs / refactor / ci / build / test / style → no bump
#
# If no releasable commits exist, the workflow runs but creates no tag.
# Force a release manually with workflow_dispatch + the bump input.
#
# Why we explicitly dispatch the downstream workflows: tags pushed by the
# default GITHUB_TOKEN don't trigger other workflows. We use `actions: write`
# permission and `gh workflow run --ref <tag>` to kick them off ourselves —
# no PAT required.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force a specific bump (overrides commit analysis)'
        required: false
        type: choice
        default: 'auto'
        options: ['auto', 'patch', 'minor', 'major']

permissions:
  contents: write # push the tag
  actions: write # dispatch downstream workflows

concurrency:
  # Don't race multiple tagging runs on rapid pushes.
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag || steps.tag_forced.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for conventional-commit analysis

      # Path A: commit-driven (push events, or workflow_dispatch with bump=auto).
      - name: Tag from conventional commits
        id: tag
        if: "github.event_name == 'push' || github.event.inputs.bump == 'auto'"
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false # no implicit bump for non-conventional commits
          tag_prefix: v
          release_branches: main
          fetch_all_tags: true

      # Path B: human forced a specific bump via workflow_dispatch.
      - name: Tag with forced bump
        id: tag_forced
        if: "github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'auto'"
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump }}
          tag_prefix: v
          release_branches: main
          fetch_all_tags: true

      - name: No-op summary if nothing to release
        if: steps.tag.outputs.new_tag == '' && steps.tag_forced.outputs.new_tag == ''
        run: echo "::notice::No releasable commits since last tag — skipping tag creation."

  dispatch:
    name: Dispatch image build & deploy
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Trigger downstream workflows on new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          echo "Dispatching build-images.yml @ $TAG"
          gh workflow run build-images.yml --ref "$TAG"
          echo "Dispatching deploy-prod.yml @ $TAG"
          gh workflow run deploy-prod.yml --ref "$TAG"
