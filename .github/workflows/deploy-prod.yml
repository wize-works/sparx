name: Deploy to production

# Triggered by a v* tag push (from release-please) or manual workflow_dispatch.
# Rolls out the image for the resolved tag to each Deployment that exists in
# the cluster, then runs a smoke check.
#
# Migrations are NOT part of this workflow — db-migrate.yml owns them and
# runs on every push to main that touches the schema. By the time a tag is
# released and this workflow runs, migrations have already been applied.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image tag/sha to deploy (default: current commit)'
        required: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sparxworks
  REGION: us-central1
  CLUSTER: sparx-prod-autopilot
  NAMESPACE: sparx-prod
  AR_REPO: sparx
  WIF_PROVIDER: projects/631794111842/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: sparx-deployer@sparxworks.iam.gserviceaccount.com

jobs:
  deploy:
    name: Rollout
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      # Connect Gateway routes through Google's proxy and works against the
      # private GKE endpoint. `get-gke-credentials@v2` returns the public IP
      # which is unreachable from the runner — that's what caused the i/o
      # timeout against 35.255.x.x in earlier runs.
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE credentials via Connect Gateway
        run: gcloud container fleet memberships get-credentials "$CLUSTER" --location "$REGION"

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.sha || github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rollout image to each app & worker
        run: |
          IMAGE_BASE="$REGION-docker.pkg.dev/${{ env.PROJECT_ID }}/$AR_REPO"
          # Update only the Deployments that currently exist. Skipping unknown
          # services keeps the workflow green during phased rollouts.
          for svc in web api-rest api-graphql api-mcp dashboard storefront \
                     worker-email worker-domain worker-dropship worker-billing worker-webhook; do
            if kubectl get deployment "$svc" -n $NAMESPACE >/dev/null 2>&1; then
              echo "::group::Rolling out $svc"
              kubectl set image deployment/$svc \
                $svc=$IMAGE_BASE/$svc:${{ steps.tag.outputs.tag }} \
                -n $NAMESPACE
              kubectl rollout status deployment/$svc -n $NAMESPACE --timeout=5m
              echo "::endgroup::"
            else
              echo "::notice::Skipping $svc — Deployment not present in cluster yet."
            fi
          done

      - name: Smoke test
        run: |
          # Hit /health on the public endpoints. Will only succeed once
          # Cloudflare is live and DNS resolves.
          for host in api.sparx.works app.sparx.works mcp.sparx.works; do
            if curl -fsSL --max-time 10 "https://$host/health" >/dev/null; then
              echo "OK: $host"
            else
              echo "::warning::smoke check failed for $host (expected during pre-DNS phase)"
            fi
          done
