name: Build & push images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      service:
        description: 'Single service to rebuild (leave blank for all)'
        required: false

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

env:
  PROJECT_ID: sparxworks
  REGION: us-central1
  AR_REPO: sparx
  # OIDC federation — same values used by db-migrate.yml. These are public
  # identifiers (no credential value); WIF binds the wize-works/sparx repo
  # to the sparx-deployer SA via the github-pool provider.
  WIF_PROVIDER: projects/631794111842/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: sparx-deployer@sparxworks.iam.gserviceaccount.com

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Comment a service back in once its Dockerfile lands at apps/<name>/Dockerfile
        # or services/<name>/Dockerfile. Until then these jobs will fail fast on the
        # "Dockerfile missing" check.
        service:
          - web # @sparx/web — marketing site
          - api-rest
          - api-graphql
          - api-mcp
          - dashboard
          - storefront
          - media-worker
          - worker-email
          - worker-domain
          - worker-dropship
          - worker-billing
          - worker-webhook
    steps:
      - uses: actions/checkout@v4

      - name: Locate Dockerfile
        id: dockerfile
        run: |
          for candidate in apps/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}/Dockerfile; do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> $GITHUB_OUTPUT
              echo "context=$(dirname $candidate)" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "No Dockerfile found for ${{ matrix.service }} — skipping." >&2
          exit 0  # soft skip while services are still being scaffolded

      - name: Bail out if Dockerfile not found
        if: steps.dockerfile.outputs.path == ''
        run: |
          echo "::notice::Skipping ${{ matrix.service }} — Dockerfile not yet present."
          exit 0

      - uses: google-github-actions/auth@v2
        if: steps.dockerfile.outputs.path != ''
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.dockerfile.outputs.path != ''

      - name: Configure Docker for Artifact Registry
        if: steps.dockerfile.outputs.path != ''
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Compute tags
        if: steps.dockerfile.outputs.path != ''
        id: tags
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$AR_REPO/${{ matrix.service }}"
          echo "sha_tag=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version_tag=$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            echo "latest_tag=$IMAGE:latest" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.dockerfile.outputs.path != ''

      - name: Build & push
        if: steps.dockerfile.outputs.path != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          provenance: false
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          # mode=min exports only the final image layers, not every
          # intermediate. mode=max regularly hangs uploading the heavy
          # Next.js layers to GitHub Actions Cache (the image itself
          # had already been pushed to AR by the time we noticed).
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=min,scope=${{ matrix.service }}

      - name: Trivy scan
        if: steps.dockerfile.outputs.path != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.sha_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0' # report only — flip to '1' once base images are stable
