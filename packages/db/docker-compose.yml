# Local Postgres 18 for Sparx development.
# Production runs on Cloud SQL Postgres 18 (docs/03-infrastructure-deployment.md).
# Brought up via `pnpm --filter @sparx/db db:up`.

services:
  postgres:
    image: postgres:18-alpine
    container_name: sparx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparx_owner
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: sparx
    ports:
      - '5544:5432'
    volumes:
      # Postgres 18+ stores data under a major-version subdirectory inside
      # /var/lib/postgresql; mounting the parent (not /data) keeps the image's
      # pg_ctlcluster layout intact (https://github.com/docker-library/postgres/pull/1259).
      - sparx-pg-data:/var/lib/postgresql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sparx_owner -d sparx']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sparx-pg-data:
