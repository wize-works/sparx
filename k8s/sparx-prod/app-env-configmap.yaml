# sparx-app-env — non-secret runtime env shared by api-rest, dashboard,
# and future @sparx services. Secrets (DATABASE_URL, JWT secret, Stripe
# keys, etc.) live in `sparx-app-secrets` and are synced from GCP Secret
# Manager via k8s/scripts/sync-secrets.ps1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sparx-app-env
  namespace: sparx-prod
data:
  # Where pods publish events. Empty / absent disables Pub/Sub (dev path).
  # The api-rest publisher uses one topic per EventType (topic name == event
  # type) — no shared/fan-out topic, so there is no PUBSUB_TOPIC to set.
  GCP_PROJECT_ID: sparxworks
  # Better Auth / dashboard need to know the canonical public origin so the
  # OAuth/session cookies scope correctly. NOT a secret.
  BETTER_AUTH_URL: https://app.sparx.works
  NEXT_PUBLIC_APP_URL: https://app.sparx.works
  NEXT_PUBLIC_API_URL: https://api.sparx.works
  NEXT_PUBLIC_MARKETING_URL: https://sparx.works
  # Dashboard → api-rest in-cluster URL. Avoids going out through Caddy.
  SPARX_API_REST_URL: http://api-rest.sparx-prod.svc.cluster.local:3000
  # Media storage. Bucket names match terraform/modules/storage:
  #   GCS_MEDIA_BUCKET        → private bucket — originals
  #   GCS_MEDIA_PUBLIC_BUCKET → public bucket — variants
  #
  # Both buckets are private at the GCS layer (org enforces DRS / no
  # allUsers bindings). Variant bytes are served via api-rest's
  # `GET /v1/public/media/variants/:tenantId/:assetId/:filename` route
  # which streams from GCS using the app SA. Cloudflare in front of
  # api.sparx.works caches the response indefinitely (Cache-Control:
  # public, immutable, max-age=1yr).
  #
  # MEDIA_PUBLIC_URL is the externally-reachable api-rest origin used to
  # mint variant URLs (`{MEDIA_PUBLIC_URL}/v1/public/media/variants/...`).
  # When a dedicated CDN domain like `media.sparx.works` lands, repoint
  # MEDIA_PUBLIC_URL there — the path under it stays the same.
  GCS_MEDIA_BUCKET: sparxworks-sparx-prod-media
  GCS_MEDIA_PUBLIC_BUCKET: sparxworks-sparx-prod-media-public
  MEDIA_PUBLIC_URL: https://api.sparx.works
  # Outbound email — email-worker reads SPARX_EMAIL_PROVIDER and either
  # logs (console) or POSTs to Postal (postal). Flip to "postal" once
  # the postal-api-key secret in sparx-app-secrets is populated.
  #
  # SPARX_POSTAL_URL points at the in-cluster Postal Web service —
  # avoids going out through Caddy + Cloudflare for a hop the worker
  # makes constantly.
  SPARX_EMAIL_PROVIDER: console
  SPARX_POSTAL_URL: http://postal-web.postal.svc.cluster.local:5000
  LOG_LEVEL: info
