# services/api-graphql — production manifest. Mirrors api-rest.yaml; the
# differences are:
#   - PORT 3200 (env default)
#   - Image tag `api-graphql`
#   - HPA scales on CPU only (memory autoscaling for a Node.js process is
#     a feedback loop — see commits around 2026-05-28 on api-rest.yaml)
#   - requests.memory == limits.memory for Guaranteed QoS on Autopilot
#
# Pod env hydrates from the same sparx-app-env / sparx-app-secrets that
# api-rest uses. SPARX_INTERNAL_JWT_SECRET, GCP_PROJECT_ID, DATABASE_URL
# all read from those.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-graphql
  namespace: sparx-prod
  labels:
    app: api-graphql
    tier: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-graphql
  template:
    metadata:
      labels:
        app: api-graphql
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: api-graphql
          image: us-central1-docker.pkg.dev/sparxworks/sparx/api-graphql:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3200
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: api-graphql
            - name: PORT
              value: '3200'
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: '100m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 10']
---
apiVersion: v1
kind: Service
metadata:
  name: api-graphql
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3200
      targetPort: 3200
  selector:
    app: api-graphql
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-graphql
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-graphql
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-graphql
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-graphql
