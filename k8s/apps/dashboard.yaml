# apps/dashboard — production manifest. Next.js standalone server on port 3000.
# Shares the sparx-app-env ConfigMap and sparx-app-secrets Secret with api-rest
# (so DATABASE_URL, SPARX_INTERNAL_JWT_SECRET, etc. resolve the same way).
# Image is substituted at deploy time by the GitHub Actions workflow.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: sparx-prod
  labels:
    app: dashboard
    tier: web
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        tier: web
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: dashboard
          image: us-central1-docker.pkg.dev/sparxworks/sparx/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: dashboard
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /sign-in
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /sign-in
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: dashboard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dashboard
  namespace: sparx-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dashboard
