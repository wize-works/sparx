# Reference template for a Sparx app Deployment. Copy + adapt for api-graphql,
# api-mcp, dashboard, storefront, marketing. See apps/README.md.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-rest
  namespace: sparx-prod
  labels:
    app: api-rest
    tier: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-rest
  template:
    metadata:
      labels:
        app: api-rest
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: api-rest
          image: us-central1-docker.pkg.dev/REPLACE_PROJECT_ID/sparx/api-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: api-rest
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                # SIGTERM-tolerant graceful shutdown: drain in-flight requests
                command: ['/bin/sh', '-c', 'sleep 10']
---
apiVersion: v1
kind: Service
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: api-rest
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-rest
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-rest
