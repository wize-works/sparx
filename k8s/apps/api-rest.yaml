# services/api-rest — production manifest. Mirrors the api-rest.example.yaml
# template; differences from the template:
#   - PORT is set to 3000 (Fastify env default)
#   - Health probe path /health (no envelope — see src/routes/health.ts)
#   - Image is substituted at deploy time by the GitHub Actions workflow
#
# Pod env hydrates from the same sparx-app-env / sparx-app-secrets that the
# dashboard and other services use. The internal-trust JWT secret +
# Pub/Sub project id are expected to be in sparx-app-secrets:
#   - SPARX_INTERNAL_JWT_SECRET — shared with dashboard for the JWT bridge
#   - GCP_PROJECT_ID            — enables the real Pub/Sub publisher
#   - PUBSUB_TOPIC              — defaults to sparx.events
#
# DATABASE_URL is also resolved from sparx-app-secrets and points at the
# in-cluster PgBouncer service. RLS GUCs are set per-request inside the
# service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-rest
  namespace: sparx-prod
  labels:
    app: api-rest
    tier: api
spec:
  replicas: 1 # TEMP: SSD_TOTAL_GB quota at 235/250GB blocks scale-up; restore to 2 after quota bump
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-rest
  template:
    metadata:
      labels:
        app: api-rest
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: api-rest
          image: us-central1-docker.pkg.dev/sparxworks/sparx/api-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: api-rest
            - name: PORT
              value: '3000'
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: '100m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 10']
---
apiVersion: v1
kind: Service
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: api-rest
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-rest
  minReplicas: 1 # TEMP: SSD_TOTAL_GB quota at 235/250GB blocks scale-up; restore to 2 after quota bump
  maxReplicas: 1 # TEMP: clamped to 1 so CPU spikes can't trigger HPA scale-up while quota is constrained
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-rest
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-rest
