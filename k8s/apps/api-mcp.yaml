# services/api-mcp — production manifest. Mirrors api-rest.yaml; the
# differences are:
#   - Image tag `api-mcp`
#   - Hosts mcp.sparx.works via the Caddy reverse-proxy (configmap.yaml)
#   - Phase-1 cap at 2 replicas matches api-rest (api-mcp throughput is
#     proportional to MCP tool calls — early-stage volume is low)
#
# Pod env hydrates from the same sparx-app-env / sparx-app-secrets that
# api-rest uses. SPARX_INTERNAL_JWT_SECRET is shared so dashboard-issued
# JWTs accepted by api-rest are also accepted here.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-mcp
  namespace: sparx-prod
  labels:
    app: api-mcp
    tier: api
spec:
  replicas: 1 # TEMP: SSD_TOTAL_GB quota at 235/250GB blocks scale-up; restore to 2 after quota bump
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-mcp
  template:
    metadata:
      labels:
        app: api-mcp
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: api-mcp
          image: us-central1-docker.pkg.dev/sparxworks/sparx/api-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: api-mcp
            - name: PORT
              value: '3000'
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: '100m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 10']
---
apiVersion: v1
kind: Service
metadata:
  name: api-mcp
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: api-mcp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-mcp
  namespace: sparx-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-mcp
  minReplicas: 1 # TEMP: SSD_TOTAL_GB quota at 235/250GB blocks scale-up; restore to 2 after quota bump
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-mcp
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-mcp
