# services/api-mcp — production manifest. Mirrors api-rest.yaml; the
# differences are:
#   - Image tag `api-mcp`
#   - Hosts mcp.sparx.works via the Caddy reverse-proxy (configmap.yaml)
#   - Phase-1 cap at 2 replicas matches api-rest (api-mcp throughput is
#     proportional to MCP tool calls — early-stage volume is low)
#
# Pod env hydrates from the same sparx-app-env / sparx-app-secrets that
# api-rest uses. SPARX_INTERNAL_JWT_SECRET is shared so dashboard-issued
# JWTs accepted by api-rest are also accepted here.
#
# PARKED — 2026-05-29. Deployment is scaled to 0 and HPA + PDB are removed
# until the SSD_TOTAL_GB quota (currently 235/250GB) is bumped. While
# parked: mcp.sparx.works will 502 (Caddy has no upstream). Restore plan
# after quota bump:
#   1. Set replicas: 2 below.
#   2. Re-add the HorizontalPodAutoscaler (minReplicas: 1, maxReplicas: 2,
#      same CPU=70% target as api-rest) and PodDisruptionBudget
#      (minAvailable: 1).
#   3. Drop the matching kubectl delete steps from bootstrap.yml so the
#      next reapply doesn't tear them down again.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-mcp
  namespace: sparx-prod
  labels:
    app: api-mcp
    tier: api
spec:
  replicas: 0 # PARKED — restore to 2 after SSD_TOTAL_GB quota bump
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-mcp
  template:
    metadata:
      labels:
        app: api-mcp
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: api-mcp
          image: us-central1-docker.pkg.dev/sparxworks/sparx/api-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: api-mcp
            - name: PORT
              value: '3000'
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: '100m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 10']
---
apiVersion: v1
kind: Service
metadata:
  name: api-mcp
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: api-mcp
# HorizontalPodAutoscaler + PodDisruptionBudget removed while parked:
# stable HPA requires minReplicas >= 1, and a PDB with minAvailable: 1
# against 0 replicas would block every voluntary disruption in the
# namespace. bootstrap.yml deletes any leftover api-mcp HPA/PDB from the
# cluster so the parked state stays consistent across re-applies.
