# @sparx/web — public marketing site.
# Serves sparx.works + all the module marketing domains (sparxcms.com,
# sparxcrm.com, sparxemail.com, sparxb2b.com, sparx.email apex) via a single
# Next.js app that reads the Host header in middleware.
#
# Phase 1: 2 replicas, no DB or secrets needed. HPA omitted — bring it back
# in if marketing traffic actually justifies autoscaling.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sparx-prod
  labels:
    app: web
    tier: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        tier: api
    spec:
      serviceAccountName: sparx-app
      containers:
        - name: web
          image: us-central1-docker.pkg.dev/sparxworks/sparx/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
            - name: HOSTNAME
              value: '0.0.0.0'
            - name: NEXT_TELEMETRY_DISABLED
              value: '1'
          resources:
            requests:
              cpu: '200m'
              memory: '256Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 5']
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: web
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web
  namespace: sparx-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web
