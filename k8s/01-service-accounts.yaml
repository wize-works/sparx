# Shared KSA for application + worker pods.
# Annotate with iam.gke.io/gcp-service-account=<app_gsa_email from Terraform>
# after first apply — see k8s/README.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sparx-app
  namespace: sparx-prod
  # annotations:
  #   iam.gke.io/gcp-service-account: sparx-app@PROJECT_ID.iam.gserviceaccount.com
---
# Caddy doesn't need GCP API access — internal-only routing.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: caddy
  namespace: sparx-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: sparx-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgbouncer
  namespace: sparx-prod
