# Media transcode worker — pulls media.uploaded events from Pub/Sub,
# generates AVIF/WebP/JPEG variants with sharp, and persists them under
# the per-tenant /variants/ prefix in the media bucket.
#
# Authoring conventions follow worker-email.example.yaml. CPU + memory
# limits are higher because sharp/libvips needs headroom for 2000px AVIF
# encodes; lifecycle is otherwise identical to the other Pub/Sub workers.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-worker
  namespace: sparx-prod
  labels:
    app: media-worker
    tier: worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: media-worker
  template:
    metadata:
      labels:
        app: media-worker
        tier: worker
    spec:
      serviceAccountName: sparx-app
      terminationGracePeriodSeconds: 120  # libvips encodes finish in <60s; this is the SIGTERM budget
      containers:
        - name: media-worker
          image: us-central1-docker.pkg.dev/sparxworks/sparx/media-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: media-worker
            - name: PUBSUB_SUBSCRIPTION
              value: media-worker
            - name: GCS_MEDIA_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: sparx-app-env
                  key: GCS_MEDIA_BUCKET
            - name: MAX_CONCURRENT
              value: "2"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1500m"   # sharp can saturate a vCPU during AVIF encodes
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: media-worker
  namespace: sparx-prod
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: media-worker
