# Email worker — pulls email.send events from Pub/Sub, renders React Email
# templates via @sparx/email, and hands the rendered SendableEmail to the
# package's provider (console in dev, Postal in prod).
#
# Authoring conventions follow worker.example.yaml. CPU + memory are light
# because rendering is pure JS and Postal handles SMTP elsewhere.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: sparx-prod
  labels:
    app: email-worker
    tier: worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: email-worker
  template:
    metadata:
      labels:
        app: email-worker
        tier: worker
    spec:
      serviceAccountName: sparx-app
      terminationGracePeriodSeconds: 60 # give in-flight Postal POSTs time to ack/nack
      containers:
        - name: email-worker
          image: us-central1-docker.pkg.dev/sparxworks/sparx/email-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: email-worker
            - name: PUBSUB_SUBSCRIPTION
              value: email.send.email-worker
            - name: MAX_CONCURRENT
              value: '8'
            # Provider selection: leave SPARX_EMAIL_PROVIDER absent (or
            # set to "console") until Postal is deployed — the worker
            # logs each rendered email instead of relaying. Switch to
            # "postal" once SPARX_POSTAL_URL + SPARX_POSTAL_API_KEY are
            # populated in sparx-app-env / sparx-app-secrets.
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: email-worker
  namespace: sparx-prod
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: email-worker
