# email-worker has moved to Cloud Run.
#
# The service is now provisioned by terraform/envs/prod/serverless.tf via
# the cloud-run-worker module, and Pub/Sub delivers messages via the push
# subscription `email.send.email-worker-cloudrun`. The old pull
# subscription `email.send.email-worker` is left in place during the
# cutover; the in-cluster Deployment below is preserved (commented) as
# the rollback path.
#
# To roll back:
#   1. Uncomment this manifest
#   2. Re-add `email-worker.yaml` to k8s/workers/kustomization.yaml
#   3. Apply via the deploy workflow
#   4. Cloud Run scales to zero on its own; the push subscription can be
#      left running or deleted in a follow-up Terraform apply.
#
# A follow-up PR after a stable week on Cloud Run will:
#   - Delete this file
#   - Remove the entry from kustomization.yaml
#   - Drop `email-worker` from the topics map in terraform/envs/prod/main.tf
#
