# Reference template for a Sparx worker Deployment. The real
# media-worker.yaml + email-worker.yaml in this directory follow this
# shape; copy + adapt for the remaining unbuilt workers (domain-worker,
# dropship-worker, billing-worker, webhook-worker — note the
# <function>-worker naming convention).
#
# Workers are Pub/Sub consumers; no public Service, no HPA in Phase 1.
# Replace every REPLACE_* placeholder before applying.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: REPLACE_NAME-worker
  namespace: sparx-prod
  labels:
    app: REPLACE_NAME-worker
    tier: worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: REPLACE_NAME-worker
  template:
    metadata:
      labels:
        app: REPLACE_NAME-worker
        tier: worker
    spec:
      serviceAccountName: sparx-app
      terminationGracePeriodSeconds: 60 # give in-flight Pub/Sub acks time to land
      containers:
        - name: REPLACE_NAME-worker
          image: us-central1-docker.pkg.dev/sparxworks/sparx/REPLACE_NAME-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sparx-app-env
            - secretRef:
                name: sparx-app-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: REPLACE_NAME-worker
            - name: PUBSUB_SUBSCRIPTION
              value: REPLACE_TOPIC.REPLACE_NAME-worker
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '256Mi'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: REPLACE_NAME-worker
  namespace: sparx-prod
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: REPLACE_NAME-worker
