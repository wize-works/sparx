# Typesense — Phase 1 single-node, PVC-backed. Phase 2 upgrade to 3-node
# cluster is a values bump (replicas: 3 + headless service + peering env),
# not a re-architecture.
#
# API key is mounted from the typesense-api-key Secret (also referenced
# by the commerce-indexer Cloud Run env binding). The Secret is created
# manually via `gcloud secrets create` + `kubectl create secret` since it
# isn't generated by the app — Typesense accepts any string, but it must
# match the value the indexer reads at runtime.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: typesense
  namespace: sparx-prod
spec:
  serviceName: typesense
  replicas: 1
  selector:
    matchLabels:
      app: typesense
  template:
    metadata:
      labels:
        app: typesense
    spec:
      containers:
        - name: typesense
          image: typesense/typesense:28.0
          args:
            - '--data-dir=/data'
            - '--api-key=$(TYPESENSE_API_KEY)'
            - '--enable-cors'
            - '--listen-port=8108'
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: typesense-secrets
                  key: api-key
          ports:
            - name: typesense
              containerPort: 8108
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
          livenessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 10Gi
