# Typesense in-cluster Service. Used by in-cluster consumers (api-rest,
# dashboard ⌘K palette) at typesense.sparx-prod.svc.cluster.local:8108.
# ClusterIP only — NOT reachable from Cloud Run, since kube-DNS names and
# ClusterIPs don't route over the VPC connector. Cloud Run workers
# (commerce-indexer) use the internal LoadBalancer in service-internal.yaml.
apiVersion: v1
kind: Service
metadata:
  name: typesense
  namespace: sparx-prod
spec:
  type: ClusterIP
  ports:
    - name: typesense
      port: 8108
      targetPort: 8108
  selector:
    app: typesense
