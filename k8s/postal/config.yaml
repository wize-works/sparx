# Postal application config. Mounted into every Postal pod at
# /config/postal.yml. Schema reference:
#   https://docs.postalserver.io/getting-started/configuration
#
# IMPORTANT: Postal's legacy YAML format does NOT support shell-style
# `${VAR}` interpolation, NOR ERB tags. Anything that looks like one is
# read as a literal string. Secrets must be supplied via env vars that
# Konfig converts from the schema path:
#   schema [:main_db, :password]    → env MAIN_DB_PASSWORD
#   schema [:message_db, :password] → env MESSAGE_DB_PASSWORD
#   schema [:rails, :secret_key]    → env RAILS_SECRET_KEY
# Note: NO `POSTAL_` prefix — `:main_db` is a top-level Konfig group
# parallel to `:postal`, not nested under it. Env wins over YAML.
#
# postal-secrets carries these env names; we leave password fields out
# of the YAML entirely and let the env source provide them.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postal-config
  namespace: postal
  labels:
    app: postal
data:
  postal.yml: |
    general:
      use_ip_pools: false
      maximum_delivery_attempts: 18
      maximum_hold_expiry_days: 7
      suppression_list_automatic_removal_days: 30

    web:
      host: postal.sparx.email
      protocol: https

    smtp_server:
      port: 25
      tls_enabled: true
      proxy_protocol: false
      log_connect: false

    # NOTE: postal.smtp_relays (the outbound smarthost list) is NOT
    # configured here. v3 takes it as a JSON array of URI strings via the
    # POSTAL_SMTP_RELAYS env var, and the URI embeds the SMTP AUTH user
    # and password — putting it in this ConfigMap would commit creds to
    # git. bootstrap.yml fetches mailgun-smtp-username + mailgun-smtp-password
    # from Secret Manager, URL-encodes them, and assembles
    #   POSTAL_SMTP_RELAYS=["smtp://user:pass@smtp.mailgun.org:587?ssl_mode=STARTTLS"]
    # into the postal-secrets Secret. See bootstrap.yml `Apply Postal` step.
    #
    # We relay through Mailgun because GCP blocks outbound TCP/25 at the
    # network edge — Postal cannot deliver direct to recipient MX hosts
    # from a GKE pod. Mailgun's :587 with SMTP AUTH is allowed.

    # main_db / message_db: password comes from env (MAIN_DB_PASSWORD /
    # MESSAGE_DB_PASSWORD via postal-secrets). Do NOT put the password
    # here — Postal would read it literally. Host/username/database stay
    # here so they're version-controlled config, not opaque env state.
    main_db:
      host: mariadb.postal.svc.cluster.local
      port: 3306
      username: postal
      database: postal

    message_db:
      host: mariadb.postal.svc.cluster.local
      port: 3306
      username: postal
      prefix: postal

    # Postal v3 dropped RabbitMQ entirely (see docs/upgrade-to-v3). We
    # leave the StatefulSet definitions in this dir for now but they're
    # vestigial; remove once we're confident nothing references them.

    dns:
      mx_records:
        - mail.sparx.email
      smtp_server_hostname: mail.sparx.email
      spf_include: spf.sparx.email
      return_path: rp.sparx.email
      route_domain: routes.sparx.email
      track_domain: track.sparx.email
      helo_hostname: mail.sparx.email

    smtp:
      # Where Postal sends its own outbound notifications (admin alerts,
      # bounce reports). Points at the postal-smtp Service rather than
      # loopback — see smtp_relays comment above.
      host: postal-smtp.postal.svc.cluster.local
      port: 25
      from_address: postal@sparx.email

    rails:
      environment: production
      # secret_key comes from env RAILS_SECRET_KEY via postal-secrets

    fast_server:
      enabled: false # we don't terminate inbound HTTP at Postal; Caddy handles TLS

    workers:
      threads: 4
