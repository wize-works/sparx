# Postal Worker — background queue consumer. Drives the actual SMTP
# outbound delivery (DNS lookup of recipient MX, TLS handshake, send,
# retry on transient failure). In Postal v3 it also runs scheduled
# tasks that used to live in postal-cron.
#
# Single replica in Phase 1. Postal can scale horizontally on workers,
# but at our send volume one worker keeps up easily.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postal-worker
  namespace: postal
  labels:
    app: postal-worker
    tier: postal
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: postal-worker
  template:
    metadata:
      labels:
        app: postal-worker
        tier: postal
    spec:
      serviceAccountName: postal
      # SMTP sends can run long on slow MX hosts — give them a window
      # to finish before SIGKILL.
      terminationGracePeriodSeconds: 90
      containers:
        - name: postal-worker
          image: ghcr.io/postalserver/postal:3.3.4
          imagePullPolicy: IfNotPresent
          command: ['postal', 'worker']
          env:
            - name: POSTAL_SIGNING_KEY_PATH
              value: /signing-key/signing.key
          envFrom:
            - secretRef:
                name: postal-secrets
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: signing-key
              mountPath: /signing-key
              readOnly: true
          resources:
            requests:
              cpu: '200m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '1Gi'
      volumes:
        - name: config
          configMap:
            name: postal-config
        - name: signing-key
          secret:
            secretName: postal-secrets
            items:
              - key: SIGNING_KEY
                path: signing.key
            defaultMode: 0o444 # postal runs as uid 999, secret files default to root:root
