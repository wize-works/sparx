apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: postal
# Order matters at first apply: namespace → secrets → stateful backends →
# config → bootstrap Job → app pods. Kustomize doesn't apply in declared
# order, so bootstrap.yml drives the sequencing explicitly (see the
# `postal` component there).
resources:
  - namespace.yaml
  - mariadb.yaml
  - secrets.yaml
  - config.yaml
  - bootstrap-job.yaml
  - smtp.yaml
  - web.yaml
  - worker.yaml
  # rabbitmq.yaml + cron.yaml dropped: Postal v3 has no RabbitMQ and no
  # `postal cron` command; both were vestigial. See
  # feedback_postal_config_gotchas.md.
