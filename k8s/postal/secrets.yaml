# Postal application secrets — TEMPLATE only. bootstrap.yml creates the
# real Secret imperatively, fetching values from GCP Secret Manager and
# using the Konfig-derived env-var names (NOT the legacy POSTAL_* keys
# — see feedback_postal_config_gotchas.md):
#
#   postal-db-password         → MAIN_DB_PASSWORD + MESSAGE_DB_PASSWORD
#   postal-rails-secret-key    → RAILS_SECRET_KEY  (256-bit base64)
#   postal-signing-key         → SIGNING_KEY       (RSA private PEM,
#                                                   generated by
#                                                   `postal initialize`
#                                                   first-boot then
#                                                   stored back to SM)
#
# This YAML is not actually applied by bootstrap.yml (the workflow runs
# `kubectl create secret generic ...` instead). It's kept as a
# self-documenting reference for the schema.
---
apiVersion: v1
kind: Secret
metadata:
  name: postal-secrets
  namespace: postal
  annotations:
    sparx.works/sync-from-secret-manager: "true"
type: Opaque
stringData:
  MAIN_DB_PASSWORD: REPLACE_AT_BOOTSTRAP
  MESSAGE_DB_PASSWORD: REPLACE_AT_BOOTSTRAP
  RAILS_SECRET_KEY: REPLACE_AT_BOOTSTRAP
  SIGNING_KEY: REPLACE_AT_BOOTSTRAP
