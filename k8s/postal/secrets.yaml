# Postal application secrets — interpolated into postal.yml at boot.
# bootstrap.yml syncs the real values from GCP Secret Manager:
#
#   postal-db-password         → POSTAL_DB_PASSWORD
#   postal-rabbitmq-password   → POSTAL_RABBITMQ_PASSWORD
#   postal-rails-secret-key    → POSTAL_RAILS_SECRET_KEY  (256-bit base64)
#   postal-signing-key         → POSTAL_SIGNING_KEY       (RSA private PEM,
#                                                          generated by
#                                                          `postal initialize`
#                                                          first-boot then
#                                                          stored back to SM)
#
# DO NOT commit real values — the YAML below is a TEMPLATE.
---
apiVersion: v1
kind: Secret
metadata:
  name: postal-secrets
  namespace: postal
  annotations:
    sparx.works/sync-from-secret-manager: "true"
type: Opaque
stringData:
  POSTAL_DB_PASSWORD: REPLACE_AT_BOOTSTRAP
  POSTAL_RABBITMQ_PASSWORD: REPLACE_AT_BOOTSTRAP
  POSTAL_RAILS_SECRET_KEY: REPLACE_AT_BOOTSTRAP
  POSTAL_SIGNING_KEY: REPLACE_AT_BOOTSTRAP
