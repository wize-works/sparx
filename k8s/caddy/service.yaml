apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: sparx-prod
  annotations:
    # Use the regional static IP reserved in Terraform (output: ingress_ip).
    # Patch loadBalancerIP after first apply — see k8s/README.md.
    cloud.google.com/l4-rbs: 'enabled'
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local # preserve client IP for on-demand TLS validation
  # loadBalancerIP: <patch in from terraform output ingress_ip>
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  selector:
    app: caddy
