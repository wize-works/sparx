apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: sparx-prod
data:
  Caddyfile: |
    {
      email ops@sparx.works
      admin off

      # On-demand TLS — issues Let's Encrypt certs for tenant subdomains
      # (slug.sparx.zone) and custom domains (shop.merchant.com) on first
      # HTTPS request. Validated against the API before issuance to prevent
      # unauthorized cert minting.
      on_demand_tls {
        ask http://api-rest.sparx-prod.svc.cluster.local:3000/internal/domain-check
        interval 2m
        burst 5
      }
    }

    # ----- HTTP → HTTPS -----
    :80 {
      redir https://{host}{uri} permanent
    }

    # ----- Platform hostnames (Cloudflare-proxied; cert from on-demand) -----
    api.sparx.works {
      tls {
        on_demand
      }
      reverse_proxy api-rest.sparx-prod.svc.cluster.local:3000
    }

    # media.sparx.works — public CDN domain for transcoded media variants.
    # Cloudflare caches everything for a year; the origin only sees a sliver
    # of traffic, and merchants get fast TTFB worldwide. The path under it
    # is identical to api.sparx.works so MEDIA_PUBLIC_URL is a single env
    # swap. Only the /v1/public/media/* routes serve here — anything else
    # 404s by virtue of the api-rest route map.
    media.sparx.works {
      tls {
        on_demand
      }
      header {
        # Belt + suspenders: Cloudflare already adds these but origin-side
        # headers survive a CF bypass. `immutable` is critical — the URL
        # encodes width + format, so the bytes never change.
        Cache-Control "public, max-age=31536000, immutable"
        # Strip any cookies merchant proxies might forward — the CDN
        # variants are pure content.
        -Set-Cookie
      }
      reverse_proxy api-rest.sparx-prod.svc.cluster.local:3000
    }

    graphql.sparx.works {
      tls {
        on_demand
      }
      reverse_proxy api-graphql.sparx-prod.svc.cluster.local:3200
    }

    mcp.sparx.works {
      tls {
        on_demand
      }
      reverse_proxy api-mcp.sparx-prod.svc.cluster.local:3000
    }

    app.sparx.works {
      tls {
        on_demand
      }
      reverse_proxy dashboard.sparx-prod.svc.cluster.local:3000
    }

    sparx.works, www.sparx.works {
      tls {
        on_demand
      }
      reverse_proxy web.sparx-prod.svc.cluster.local:3000
    }

    # ----- Module marketing sites -----
    # Each domain serves its own marketing/landing site (single Next.js app
    # reads the Host header and renders the right module page).
    sparxcms.com, www.sparxcms.com,
    sparxcrm.com, www.sparxcrm.com,
    sparxemail.com, www.sparxemail.com,
    sparxb2b.com, www.sparxb2b.com,
    sparx.email, www.sparx.email {
      tls {
        on_demand
      }
      reverse_proxy web.sparx-prod.svc.cluster.local:3000
    }

    # ----- Postal admin UI -----
    # Lives in its own namespace (postal/), separate from sparx-prod.
    # email-worker reaches Postal in-cluster via the postal-web Service
    # DNS name — this hostname is for the human admin UI only.
    postal.sparx.email {
      tls {
        on_demand
      }
      reverse_proxy postal-web.postal.svc.cluster.local:5000
    }

    # ----- Placeholder domains (301 to corresponding sparx.works path) -----
    # Replace with real reverse_proxy targets when each product matures.
    sparx.host, www.sparx.host {
      tls {
        on_demand
      }
      redir https://sparx.works/hosting{uri} permanent
    }

    sparx.software, www.sparx.software {
      tls {
        on_demand
      }
      redir https://sparx.works/docs{uri} permanent
    }

    sparx.market, www.sparx.market {
      tls {
        on_demand
      }
      redir https://sparx.works/market{uri} permanent
    }

    sparx.exchange, www.sparx.exchange {
      tls {
        on_demand
      }
      redir https://sparx.works{uri} permanent
    }

    # sparx.zone apex — redirect to platform home.
    sparx.zone, www.sparx.zone {
      tls {
        on_demand
      }
      redir https://sparx.works{uri} permanent
    }

    # ----- Catch-all: tenant storefronts -----
    # Matches slug.sparx.zone (wildcard DNS) and any custom domain pointing
    # to customers.sparx.zone. The /internal/domain-check API decides if a
    # cert is issued.
    :443 {
      tls {
        on_demand
      }
      reverse_proxy storefront.sparx-prod.svc.cluster.local:3000
    }
